name: Count Python Files in DAGs

on:
  workflow_dispatch:
  
jobs:
  count_python_files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Files founded
        run: |
          find composer/*/dags/ -name '*.py' > dag_files.txt
          cat dag_files.txt

      - name: Count Python Files
        run: |
          file_count=$(wc -l < dag_files.txt)
          echo "Total number of Python files found: $file_count"

      - name: copy files
        run: |
          list_files=$(cat dag_files.txt | tr '\n' ' ')
          echo $list_files
          
