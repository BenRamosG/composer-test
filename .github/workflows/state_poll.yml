name: Count Python Files in DAGs

on:
  workflow_dispatch:
  
jobs:
  count_python_files:
    permissions:
      id-token: write
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - id: auth
        name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: true
          workload_identity_provider: "projects/979545525341/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-oidc"
          service_account: "github-composer@telus-tir-project.iam.gserviceaccount.com"

      - name: set credentials file
        run: gcloud auth login --brief --cred-file="${{ steps.auth.outputs.credentials_file_path }}"

      - name: Files founded
        id: files-founded
        run: |
          find composer/*/dags/ -name '*.py' > dag_files.txt
          cat dag_files.txt
          file_count=$(wc -l < dag_files.txt)
          echo "Total number of Python files found: $file_count"
          echo "total_dag_deployed=$file_count" >> $GITHUB_OUTPUT

      - name: Copy DAGs into GCP
        run: |
          list_files=$(cat dag_files.txt | tr '\n' ' ')
          
          for file in $list_files; do
            folder=$(echo "${file}" | awk -F'/' '{print $NF}' | awk -F'.' '{print $1}')
            gsutil cp "${file}" "gs://us-central1-instance-1833cf5d-bucket/dags/${folder}/dags/" 
          done

      - name: Check DAGs Composer
        run: |
          composer_dags=$(gcloud composer environments run instance --location=us-central1 dags list -- --output=json | jq '[.[] | select(.owners != ["airflow"] and .is_paused == "False")] | length')
          echo "Count Composer's Dags $composer_dags"
          
          
