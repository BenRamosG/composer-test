name: Naming Convention

on:
  workflow_dispatch:
    inputs:
      path:
        description: 'Path file to check version and update'
        required: true
        type: string
        default: "composer/groups/dags/groups.py"
      version:
        description: 'The new version to update (e.g., 1.2.3)'
        required: true
        type: string
        default: "1.0.1"
      tag:
        description: 'Tag name to create'
        required: true
        type: string
        default: ''

jobs:
  
  connect:
    permissions:
      id-token: write
      contents: read
    runs-on: ubuntu-latest


    steps:
          
      - name: Checkout
        uses: actions/checkout@v3
        
      - name: Read File
        run: |
          dag_version=$(python get_dag_version.py "${{ github.event.inputs.path }}" "dag_version")
      
          echo "DAG version: $dag_version"
