name: bq-redeploy
on:
  workflow_dispatch:

jobs:
  connect:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - id: auth
        name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: true
          workload_identity_provider: "projects/979545525341/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-oidc"
          service_account: "github-composer@telus-tir-project.iam.gserviceaccount.com"

      - name: set credentials file
        run: gcloud auth login --brief --cred-file="${{ steps.auth.outputs.credentials_file_path }}"

      - name: Read buckets
        shell: bash
        run: |
          file="bq/query.sql"

          query_validation=$(bq query --use_legacy_sql=false --dry_run --format=csv "SELECT 1" 2>&1 || true)
          
          if [[ $? -ne 0 ]]; then
            echo "BigQuery Query Validation Failed:"
            echo "$query_validation"
            exit 0 # exit 0 to prevent workflow failure
          else
             echo "BigQuery Query Validation Succeeded"
          fi

          
