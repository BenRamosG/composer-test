name: bq-redeploy
on:
  push:
    branches:
      -dev

jobs:
  connect:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - id: auth
        name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: true
          workload_identity_provider: "projects/979545525341/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-oidc"
          service_account: "github-composer@telus-tir-project.iam.gserviceaccount.com"

      - name: set credentials file
        run: gcloud auth login --brief --cred-file="${{ steps.auth.outputs.credentials_file_path }}"


      - name: Get Changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files: bq/*.sql
          write_output_files: "true"
          output_dir: "changed_sql_files"

      - name: Print file
        run: |
          cat "changed_sql_files/all_change_files.txt"
          
      
