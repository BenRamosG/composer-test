name: connect_gcp
on:
  workflow_dispatch:

jobs:
  connect:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Test
        run: |
          files="StgProvideraaa, StgProvider"
          path_files=""

          IFS=',' read -ra file_array <<< "$(echo "$files" | tr -d ' ')"
          
          for file in "${file_array[@]}"; do
            file_no_spaces=$(echo "$file" | tr -d ' ')

            path=$(find tir-bigquery/ -type f -name "$file_no_spaces.sql")

            if [ -z $path ]; then
              echo "$file_no_spaces is not founded" >> $GITHUB_STEP_SUMMARY
            else
              if [ -z $path_files ]; then
                path_files="$path"
              else
                path_files="$path_files,$path"
              fi
            fi
          done

          echo "Salida: $path_files"
                    
          
                    
