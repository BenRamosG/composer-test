name: connect_gcp
on:
  workflow_dispatch:

jobs:
  connect:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - id: auth
        name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: true
          workload_identity_provider: "projects/979545525341/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-oidc"
          service_account: "github-composer@telus-tir-project.iam.gserviceaccount.com"
 
      - name: set credentials file
        run: gcloud auth login --brief --cred-file="${{ steps.auth.outputs.credentials_file_path }}"
 
      - name: Read buckets
        shell: bash
        run: | 

          compile_errors=$(gcloud composer environments run instance --location=us-central1 dags list-import-errors -- --output=json 2>&1 || true)
          
          json_output=$(echo "$compile_errors" | grep -o '\[.*\]$')
          
          transformed_json=$(echo "$json_output" | jq -r '
            map({
              (.filepath | split("/") | last | split(".")[0]): .error
            }) | add
          ')
          
          users_value=$(echo "$transformed_json" | jq -r '.users')
          
          
          echo "$users_value"
