name: connect_gcp
on:
  workflow_dispatch:

jobs:
  connect:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - id: auth
        name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: true
          workload_identity_provider: "projects/979545525341/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-oidc"
          service_account: "github-actions-composer@telus-tir-project.iam.gserviceaccount.com"

      - name: Login GCP
        run: gcloud auth login --cred-file=${{steps.auth.outputs.credentials_file_path}}

      - name: Run test
        run: gsutil ls
