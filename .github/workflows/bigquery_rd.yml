name: bigquery_rd
on:
  workflow_dispatch:

jobs:
  connect:
    permissions:
      id-token: write
      contents: read

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - id: auth
        name: Google Cloud Auth
        uses: google-github-actions/auth@v2
        with:
          create_credentials_file: true
          workload_identity_provider: "projects/979545525341/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-oidc"
          service_account: "github-composer@telus-tir-project.iam.gserviceaccount.com"

      - name: set credentials file
        run: gcloud auth login --brief --cred-file="${{ steps.auth.outputs.credentials_file_path }}"

      - name: Run SQL
        run: |
          retries=3
          query='SELECT abc FROM `telus-tir-project.dev_01_tir_staging_dataset.StgProvider`'

          query_result=$(bq query --dry_run --use_legacy_sql=false --format=prettyjson "$query")

          if echo "$query_result" | jq -e '.' > /dev/null 2>&1; then
            state=$(echo "$query_result" | jq -r '.status.state')    

          else
            echo "Error query result: $query_result"    
          fi
