name: Capture Tag Value

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  capture_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Get Changed files 
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          dir_names: false
          files: dags/**/*.py
      
      - name: Get DAG name
        id: json_files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          file_changed=${{ steps.changed-files.outputs.all_changed_files }}
          filename=$(echo "${file_changed}" | awk -F'/' '{print $NF}' | awk -F'.' '{print $1}')
          echo "DAG=$filename" >> $GITHUB_ENV

      - name: DUMMY - Get DAG name
        env:
          ALL_CHANGED_FILES: "dags/groups.py"
        run: |
          filename=$(echo "${ALL_CHANGED_FILES}" | awk -F'/' '{print $NF}' | awk -F'.' '{print $1}')
          echo "DAG=$filename" >> $GITHUB_ENV

      - name: Check Last Version and increment
        run: |
          last_version=$(jq -r ".${{ env.DAG }}" dags/dags_versions.json)

          if [ "$last_version" == "null" ]; then
            last_version=1.0.0
          else
            major=$(echo "$last_version" | cut -d'.' -f1)
            minor=$(echo "$last_version" | cut -d'.' -f2)
            patch=$(echo "$last_version" | cut -d'.' -f3)

            kind_modification=$(git log --format=%s -n 1 "$GITHUB_SHA" | tr '[:upper:]' '[:lower:]')
            # kind_modification=$(echo "Fix: blabla" | tr '[:upper:]' '[:lower:]')

            echo "$kind_modification" >> $GITHUB_STEP_SUMMARY
            
            case "$kind_modification" in
              *fix*)
                echo "Kind: Fix" >> $GITHUB_STEP_SUMMARY
                
                ;;
              *enhance*)
                echo "Kind: Enhancement" >> $GITHUB_STEP_SUMMARY
                
                ;;
              *release*)
                echo "Kind: Release" >> $GITHUB_STEP_SUMMARY
                
                ;;
              *)
                echo "Kind: Other or unknown" >> $GITHUB_STEP_SUMMARY
                
                ;;
            esac
            
          fi
