name: Capture Tag Value

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  capture_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Get Changed files 
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          dir_names: false
          files: dags/**/*.py
      
      - name: Get DAG name
        id: json_files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          file_changed=${{ steps.changed-files.outputs.all_changed_files }}
          filename=$(echo "${file_changed}" | awk -F'/' '{print $NF}' | awk -F'.' '{print $1}')
          echo "$filename" >> $GITHUB_STEP_SUMMARY
          echo "DAG=$filename" >> $GITHUB_ENV

      - name: DUMMY - Get DAG name
        env:
          ALL_CHANGED_FILES: "dags/groups.py"
        run: |
          echo "${ALL_CHANGED_FILES}" >> $GITHUB_STEP_SUMMARY
          filename=$(echo "${ALL_CHANGED_FILES}" | awk -F'/' '{print $NF}' | awk -F'.' '{print $1}')
          echo "$filename" >> $GITHUB_STEP_SUMMARY
          echo "DAG=$filename" >> $GITHUB_ENV

      - name: Check Last Version
        run: |
          echo ${{ env.DAG }} >> $GITHUB_STEP_SUMMARY
          last_version=$(jq -r ".${{ env.DAG }}" dags/dags_versions.json)

          if [ "$last_version" == "null" ]; then
            last_version=1.0.0
          else
            major=$(echo "$last_version" | cut -d'.' -f1)
            minor=$(echo "$last_version" | cut -d'.' -f2)
            patch=$(echo "$last_version" | cut -d'.' -f3)

            kind_modification=$(git log--format=%s -n 1 "$GITHUB_SHA")

            echo $kind_modification >> $GITHUB_STEP_SUMMARY
            
          fi

          echo "The last version is: $last_version" >> $GITHUB_STEP_SUMMARY
          


          
