name: Capture Tag Value

on:
  workflow_dispatch:
      
jobs:
  capture_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Get Changed files 
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          dir_names: false
          files: dags/**/*.py
      
      - name: List updated JSON Files
        id: json_files
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          ALL_CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          echo "${ALL_CHANGED_FILES}" >> $GITHUB_STEP_SUMMARY
          echo "${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY


      - name: create dummy
        env:
          ALL_CHANGED_FILES: "dags/groups.py"
        run: |
          echo "${ALL_CHANGED_FILES}" >> $GITHUB_STEP_SUMMARY
          filename=$(basename "${ALL_CHANGED_FILES}")
          echo "$filename" >> $GITHUB_STEP_SUMMARY
          
        
        
