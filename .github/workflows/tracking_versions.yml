name: Capture Tag Value

on:
  push:
    branches:
      - main

      
jobs:
  capture_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0 # Important for fetching tags

      - name: Get Tag Name
        id: get_tag
        run: |
          COMMIT_MESSAGES=$(git log --pretty=format:"%s")
          echo "$COMMIT_MESSAGES" >> $GITHUB_STEP_SUMMARY
