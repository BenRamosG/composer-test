name: Capture Tag Value

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  capture_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Get Changed files 
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          dir_names: false
          files: dags/**/*.py
      
      - name: Get name DAG modified
        id: json_files
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          file_changed=${{ steps.changed-files.outputs.all_changed_files }}
          filename=$(echo "${file_changed}" | awk -F'/' '{print $NF}' | awk -F'.' '{print $1}')
          echo "$filename" >> $GITHUB_STEP_SUMMARY

        
        
