name: Capture Tag Value

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  capture_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Get Changed files 
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          dir_names: false
          files: dags/**/*.py
      
      - name: Get DAG name
        id: get-change2
        if: steps.changed-files.outputs.any_changed == 'true'
        run: |
          file_changed=${{ steps.changed-files.outputs.all_changed_files }}
          file_name=$(echo "${file_changed}" | awk -F'/' '{print $NF}' | awk -F'.' '{print $1}')
          echo "dag=$file_name" >> $GITHUB_OUTPUT
          echo "dag_path=$file_changed" >> $GITHUB_OUTPUT

      - name: DUMMY - Get DAG name
        id: get-change
        env:
          ALL_CHANGED_FILES: "dags/groups.py"
        run: |
          file_changed="${ALL_CHANGED_FILES}"
          file_name=$(echo "${ALL_CHANGED_FILES}" | awk -F'/' '{print $NF}' | awk -F'.' '{print $1}')
          echo "dag=$file_name" >> $GITHUB_OUTPUT
          echo "dag_path=$file_changed" >> $GITHUB_OUTPUT

      - name: Check Last Version and increment
        id: set-new-version
        run: |
          last_version=$(jq -r ".${{ steps.get-change.outputs.dag }}" dags/dags_versions.json)

          if [ "$last_version" == "null" ]; then
            last_version=1.0.0
          else
            major=$(echo "$last_version" | cut -d'.' -f1)
            minor=$(echo "$last_version" | cut -d'.' -f2)
            patchfix=$(echo "$last_version" | cut -d'.' -f3)

            echo "Current version: $major.$minor.$patchfix" >> $GITHUB_STEP_SUMMARY

            # kind_modification=$(git log --format=%s -n 1 "$GITHUB_SHA" | tr '[:upper:]' '[:lower:]')
            kind_modification=$(echo "Release: blabla" | tr '[:upper:]' '[:lower:]')
          
            case "$kind_modification" in
              *fix*)
                echo "Kind: Fix" >> $GITHUB_STEP_SUMMARY
                patchfix=$((patchfix + 1))
                ;;
              *enhance*)
                echo "Kind: Enhancement" >> $GITHUB_STEP_SUMMARY
                minor=$((minor + 1))
                patchfix=0
                ;;
              *release*)
                echo "Kind: Release" >> $GITHUB_STEP_SUMMARY
                major=$((major + 1))
                minor=0
                patchfix=0
                ;;
              *)
                echo "Kind: Other or unknown" >> $GITHUB_STEP_SUMMARY 
                ;;
            esac
          fi

          new="$major.$minor.$patchfix"
          echo "new_version=$new" >> $GITHUB_OUTPUT

      - name: Update DAG Python file
        run: |
          dag_version="${{ steps.set-new-version.outputs.new_version }}"
          dag_file="${{ steps.get-change.outputs.dag_path }}"

          python modify_dag_version.py "$dag_file" "$dag_version"

          echo "New version: $dag_version" >> $GITHUB_STEP_SUMMARY


      - name: Check Git Status
        run: git status
