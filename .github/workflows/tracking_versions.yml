name: Capture Tag Value

on:
  workflow_dispatch:
  push:
    branches:
      - dev

jobs:
  capture_tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Get Message 
        id: get-message
        run: |
          message=$(git log --format=%s -n 1 "$GITHUB_SHA" | tr '[:upper:]' '[:lower:]')
          echo "comm_message=$message" >> $GITHUB_OUTPUT

      - name: Get Changed files 
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          dir_names: false
          files: dags/**/*.py
      
      - name: Get DAG name
        id: get-change2
        if: steps.changed-files.outputs.any_changed == 'true' && !startsWith(steps.get-message.outputs.comm_message, 'GITHUB-ACTION:')
        run: |
          file_changed=${{ steps.changed-files.outputs.all_changed_files }}
          file_name=$(echo "${file_changed}" | awk -F'/' '{print $NF}' | awk -F'.' '{print $1}')
          echo "dag=$file_name" >> $GITHUB_OUTPUT
          echo "dag_path=$file_changed" >> $GITHUB_OUTPUT

      - name: DUMMY - Get DAG name
        id: get-change
        if: (!startsWith(steps.get-message.outputs.comm_message,'GITHUB-ACTION:'))
        env:
          ALL_CHANGED_FILES: "dags/groups.py"
        run: |
          file_changed="${ALL_CHANGED_FILES}"
          file_name=$(echo "${ALL_CHANGED_FILES}" | awk -F'/' '{print $NF}' | awk -F'.' '{print $1}')
          echo "dag=$file_name" >> $GITHUB_OUTPUT
          echo "dag_path=$file_changed" >> $GITHUB_OUTPUT
          

      - name: Checkout code2
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Create Example File
        if: (!startsWith(steps.get-message.outputs.comm_message,'GITHUB-ACTION:'))
        run: echo "Hello from GitHub Actions! $(date)" > example.txt

      - name: Configure Git User
        if: (!startsWith(steps.get-message.outputs.comm_message, 'GITHUB-ACTION:'))
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Commit files
        if: (!startsWith(steps.get-message.outputs.comm_message,'GITHUB-ACTION:'))
        run: |
          git add .
          git commit -m "GITHUB-ACTION: Update version DAG"

      - name: Push changes
        if: (!startsWith(steps.get-message.outputs.comm_message,'GITHUB-ACTION:'))
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref_name }}

   
